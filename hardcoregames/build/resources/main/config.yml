HGconfigs:
  server-name: "§f[§cHardcore§fGames]"

  # Cores das mensagens — use códigos §x ou nomes como "§e", "§a", etc.
  colors:
    msg: "§f"         # mensagens informativas
    highlight: "§e"   # nomes de jogadores e valores
    error: "§c"       # erros
    success: "§a"     # confirmações
    broadcast: "§6"   # anúncios globais
  mushroom-density: 40 #Integer
  tree-density: 1 #Integer (árvores mínimas por chunk)
  damage-multiplier:
  soup-heal: 6.0 #Double
  soup-food: 7 #Double
  kangaroo:
    hit-cooldown: 3  # segundos sem poder usar o foguete após receber hit de player

  terrain:
    biome-frequency: 0.003   # menor = biomas maiores | maior = biomas menores
    plains-weight: 0.2       # limiar de umidade para plains (-1.0 a 1.0), maior = mais plains
    dark-forest-weight: -0.3 # limiar de umidade para dark forest vs birch, menor = menos dark forest

